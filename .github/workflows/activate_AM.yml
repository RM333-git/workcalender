name: Supabase API Access

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  access-supabase-api:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase with SELECT
        run: |
          curl -s -X GET \
            'https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co/rest/v1/activate_log?select=id&limit=1' \
            -H "apikey: ${{ secrets.SUPABASE_API_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_API_KEY }}" \
            -H "Content-Type: application/json"
      - name: INSERT log (optional fallback)
        run: |
          curl -X POST 'https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co/rest/v1/activate_log' \
            -H "apikey: ${{ secrets.SUPABASE_API_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"comment": "github-ping-'$(date +%s)'"}'
