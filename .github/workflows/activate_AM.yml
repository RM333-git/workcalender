name: Supabase API Access

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  access-supabase-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Access Supabase API
        run: |
          curl -X POST 'https://${{ secrets.wxopsmqkcjhdyouqjsvq }}.supabase.co/rest/v1/activate_log' \
            -H "apikey: ${{ secrets.sb_publishable_-4wQNjS35p4-CHALa7tMCw_MQimNs6s }}" \
            -H "Authorization: Bearer ${{ secrets.sb_publishable_-4wQNjS35p4-CHALa7tMCw_MQimNs6s }}" \
            -H "Content-Type: application/json" \
            -d '{"comment": "activated by github actions"}'
      
      - name: Check Activation Log Count
        run: |
          RESPONSE=$(curl -s -X POST \
            'https://${{ secrets.wxopsmqkcjhdyouqjsvq }}.supabase.co/rest/v1/rpc/count_activate_log' \
            -H "apikey: ${{ secrets.sb_publishable_-4wQNjS35p4-CHALa7tMCw_MQimNs6s }}" \
            -H "Authorization: Bearer ${{ secrets.sb_publishable_-4wQNjS35p4-CHALa7tMCw_MQimNs6s }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "ActivateLog count: $RESPONSE"
